            // 获取节点位置的辅助函数
            function getNodePosition(node, coord) {
                if (typeof node === 'object' && node !== null) {
                    return coord === 'x' ? node.x : node.y;
                } else {
                    // 如果节点不存在，则返回一个默认位置
                    return coord === 'x' ? width / 2 : height / 2;
                }
            }
            
            
            // 添加简化/还原按钮
            if (nodes.length > 0) {
                const simplifyButton = svg.append('g')
                    .attr('id', 'simplifyButton')
                    .attr('transform', `translate(10, 10)`) // 左上角位置
                    .attr('cursor', 'pointer')
                    .attr('opacity', 0.8);
                
                // 添加长方形按钮背景
                simplifyButton.append('rect')
                    .attr('x', -30)
                    .attr('y', -15)
                    .attr('width', 100)
                    .attr('height', 30)
                    .attr('rx', 5)
                    .attr('ry', 5)
                    .attr('fill', '#fff')
                    .attr('stroke', '#333')
                    .attr('stroke-width', 1);
                
                // 添加按钮文字
                simplifyButton.append('text')
                    .attr('x', 20)
                    .attr('y', 5)
                    .attr('font-size', '12px')
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'middle')
                    .text('简化图谱');
                
                // 简化按钮点击事件
                let isSimplified = false;
                let originalNodes = [...nodes];
                let originalLinks = [...links];
                let additionalRemoved = 0;  // 定义在函数作用域内，供后续使用
                
                simplifyButton.on('click', function() {
                    console.log('简化按钮被点击，当前状态:', isSimplified);
                    if (isSimplified) {
                        // 还原到完整图谱
                        console.log('开始还原到完整图谱');
                        const restoredNodes = [...originalNodes];
                        const restoredLinks = [...originalLinks];
                        
                        // 更新按钮文字为简化
                        d3.select(this).select('text').text('简化图谱');
                        
                        // 重新创建仿真
                        simulation.nodes(restoredNodes);
                        simulation.force('link').links(restoredLinks);
                        
                        // 重新绑定节点和链接
                        console.log('开始还原链接，链接数:', restoredLinks.length);
                        link = g.selectAll('line').data(restoredLinks);
                        link.exit().remove();
                        link = link.enter().append('line')
                            .attr('stroke-width', 1.5)
                            .attr('stroke', d => d.color || '#666')
                            .attr('marker-end', d => `url(#arrow-${getColorCode(d.color)})`)
                            .attr('cursor', 'pointer')
                            .on('click', (event, d) => {
                                event.stopPropagation();
                                showLinkDetails(d, transactions);
                            })
                            .merge(link);
                        
                        // 添加透明的点击区域线条（增加点击灵敏度）
                        g.append('g')
                            .selectAll('line')
                            .data(restoredLinks)
                            .join('line')
                            .attr('stroke-width', 8)
                            .attr('stroke', 'transparent')
                            .attr('cursor', 'pointer')
                            .on('click', (event, d) => {
                                event.stopPropagation();
                                showLinkDetails(d, transactions);
                            });
                        console.log('链接还原完成');
                        
                        console.log('开始还原节点，节点数:', restoredNodes.length);
                        node = g.selectAll('.node').data(restoredNodes);
                        node.exit().remove();
                        node = node.enter().append('g').attr('class', 'node')
                            .merge(node);
                        console.log('节点还原完成');
                        
                        
                        // 为非初始节点添加圆形
                        node.filter(d => !d.isInitial)
                            .append('circle')
                            .attr('r', 12)
                            .attr('fill', 'transparent')
                            .attr('stroke', d => d.group === 'sender' ? '#1f77b4' : '#ff7f0e')
                            .attr('stroke-width', 2)
                            .on('click', (event, d) => {
                                showNodeDetails(d);
                            });
                        
                        // 重新绑定标签
                        console.log('开始还原标签');
                        label = g.selectAll('text').data(restoredNodes);
                        label.exit().remove();
                        label = label.enter().append('text')
                            .text(d => d.name.length > 10 ? d.name.substring(0, 10) + '...' : d.name)
                            .attr('font-size', '10px')
                            .attr('dx', 10)
                            .attr('dy', 4)
                            .merge(label);
                        console.log('标签还原完成');
                        
                        isSimplified = false;
                    } else {
                        // 基于搜索节点的路径追踪算法，删除从搜索节点可达路径上的叶节点
                        let currentNodes = [...originalNodes];
                        let currentLinks = [...originalLinks];
                        
                        // 使用传入的中心节点作为起始节点
                        const startNodes = centerNodes || new Set();
                        
                        // 如果没有传入中心节点，则尝试从URL参数获取
                        if (startNodes.size === 0) {
                            const urlParams = new URLSearchParams(window.location.search);
                            const searchKeyword = decodeURIComponent(urlParams.get('accountName') || '').replace(/^"|"$/g, '').replace(/\t/g, '');
                            
                            if (searchKeyword) {
                                originalNodes.forEach(node => {
                                    if (node.id === searchKeyword) { //匹配
                                        startNodes.add(node.id);
                                    }
                                });
                            }
                        }
                        
                        // 如果仍然没有匹配的节点，则使用所有标记为初始的节点
                        if (startNodes.size === 0) {
                            originalNodes.filter(node => node.isInitial).forEach(node => startNodes.add(node.id));
                        }
                        
                        // 从原始链接构建完整的邻接表
                        const fullAdjacencyList = new Map();
                        originalNodes.forEach(node => {
                            fullAdjacencyList.set(node.id, []);
                        });
                        
                        originalLinks.forEach(link => {
                            const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                            const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                            
                            if (fullAdjacencyList.has(sourceId) && fullAdjacencyList.has(targetId)) {
                                fullAdjacencyList.get(sourceId).push(targetId);
                                fullAdjacencyList.get(targetId).push(sourceId); // 无向图
                            }
                        });
                        
                        // 从起始节点开始，深度优先搜索所有可达节点
                        const reachableNodes = new Set();
                        const stack = [...startNodes];
                        
                        while (stack.length > 0) {
                            const node = stack.pop();
                            if (!reachableNodes.has(node)) {
                                reachableNodes.add(node);
                                
                                const neighbors = fullAdjacencyList.get(node) || [];
                                for (const neighbor of neighbors) {
                                    if (!reachableNodes.has(neighbor)) {
                                        stack.push(neighbor);
                                    }
                                }
                            }
                        }
                        
                        // 计算可达子图中每个节点的度数
                        const subgraphDegreeMap = new Map();
                        
                        // 初始化可达节点的度数为0
                        reachableNodes.forEach(nodeId => {
                            subgraphDegreeMap.set(nodeId, 0);
                        });
                        
                        // 计算子图中每条边对节点度数的贡献
                        originalLinks.forEach(link => {
                            const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                            const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                            
                            // 如果链接的两端都在可达子图中
                            if (reachableNodes.has(sourceId) && reachableNodes.has(targetId)) {
                                subgraphDegreeMap.set(sourceId, (subgraphDegreeMap.get(sourceId) || 0) + 1);
                                subgraphDegreeMap.set(targetId, (subgraphDegreeMap.get(targetId) || 0) + 1);
                            }
                        });
                        
                        // 识别叶节点（度数为1的节点，不保护任何节点）
                        const leafNodes = [];
                        subgraphDegreeMap.forEach((degree, nodeId) => {
                            if (degree === 1) {
                                leafNodes.push(nodeId);
                            }
                        });
                        
                        // 首先，从原始链接中过滤出只包含可达节点的链接
                        let currentActiveLinks = originalLinks.filter(link => {
                            const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                            const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                            
                            // 链接的两端都在可达节点集合中
                            return reachableNodes.has(sourceId) && 
                                   reachableNodes.has(targetId);
                        });
                        
                        // 递归移除叶节点（链路末梢）
                        let removedNodes = new Set();
                        let changed = true;
                        let iterationCount = 0;
                        
                        console.log('开始递归删除叶节点，起始节点:', Array.from(startNodes));
                        
                        while (changed) {
                            iterationCount++;
                            changed = false;
                            const nodesToRemove = [];
                            
                            console.log(`第${iterationCount}轮迭代开始`);
                            
                            // 重新计算当前子图中每个节点的度数
                            const currentDegreeMap = new Map();
                            reachableNodes.forEach(nodeId => {
                                if (!removedNodes.has(nodeId)) {
                                    currentDegreeMap.set(nodeId, 0);
                                }
                            });
                            
                            // 基于当前活跃链接计算节点度数
                            currentActiveLinks.forEach(link => {
                                const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                
                                // 如果链接的两端都没有被移除
                                if (!removedNodes.has(sourceId) && 
                                    !removedNodes.has(targetId)) {
                                    
                                    currentDegreeMap.set(sourceId, (currentDegreeMap.get(sourceId) || 0) + 1);
                                    currentDegreeMap.set(targetId, (currentDegreeMap.get(targetId) || 0) + 1);
                                }
                            });
                            
                            //找到当前度数为1的节点（叶节点），不保护任何节点
                            currentDegreeMap.forEach((degree, nodeId) => {
                                if (degree === 1) {
                                    nodesToRemove.push(nodeId);
                                }
                            });
                                                        
                            console.log(`第${iterationCount}轮发现叶节点数:`, nodesToRemove.length);
                            if (nodesToRemove.length > 0) {
                                console.log(`第${iterationCount}轮叶节点列表:`, nodesToRemove.slice(0, 10)); // 只显示前10个
                                if (nodesToRemove.length > 10) {
                                    console.log(`...还${nodesToRemove.length - 10}个叶节点`);
                                }
                            }
                            
                            // 移除找到的叶节点
                            if (nodesToRemove.length > 0) {
                                nodesToRemove.forEach(nodeId => {
                                    removedNodes.add(nodeId);
                                });
                                                            
                                console.log(`第${iterationCount}轮移除节点数:`, nodesToRemove.length);
                                console.log(`累计已移除节点数:`, removedNodes.size);
                                changed = true;
                                
                                // 重新过滤链接，移除与已删除节点相关的链接
                                currentActiveLinks = currentActiveLinks.filter(link => {
                                    const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                    const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                    
                                    return !removedNodes.has(sourceId) && !removedNodes.has(targetId);
                                });
                                
                                changed = true;
                                console.log(`移除叶节点:`, nodesToRemove);
                            }
                        }
                        
                        // 生成最终的节点和链接
                        const simplifiedNodes = currentNodes.filter(node => !removedNodes.has(node.id));
                        const simplifiedLinks = currentActiveLinks;
                        
                        console.log(`原始节点数: ${originalNodes.length}, 原始链接数: ${originalLinks.length}`);
                        console.log(`简化后节点数: ${simplifiedNodes.length},简化后链接数: ${simplifiedLinks.length}`);
                        console.log(`总共执行了 ${iterationCount}`);
                        console.log(`移除了 ${removedNodes.size} 个叶节点`);
                        console.log(`起始节点数量: ${startNodes.size}`);
                                                
                        //检查是否还有剩余的叶节点
                        const finalLeafNodes = [];
                        const finalDegreeCheck = new Map();
                                                
                        // 为简化后的图谱计算度数
                        simplifiedNodes.forEach(node => {
                            finalDegreeCheck.set(node.id, 0);
                        });
                                                
                        simplifiedLinks.forEach(link => {
                            const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                            const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                                    
                            if (finalDegreeCheck.has(sourceId) && finalDegreeCheck.has(targetId)) {
                                finalDegreeCheck.set(sourceId, (finalDegreeCheck.get(sourceId) || 0) + 1);
                                finalDegreeCheck.set(targetId, (finalDegreeCheck.get(targetId) || 0) + 1);
                            }
                        });
                                                
                        finalDegreeCheck.forEach((degree, nodeId) => {
                            if (degree === 1) {
                                finalLeafNodes.push(nodeId);
                            }
                        });
                                                
                        console.log(`简化后仍存在的叶节点数: ${finalLeafNodes.length}`);
                        if (finalLeafNodes.length > 0) {
                            console.log(`未被删除的叶节点:`, finalLeafNodes.slice(0, 20));
                            if (finalLeafNodes.length > 20) {
                                console.log(`... 还有${finalLeafNodes.length - 20}个`);
                            }
                            
                            // 第三轮优化：强制清理剩余的叶节点
                            console.log('开始第三轮优化：强制清理剩余叶节点');
                            additionalRemoved = 0;  // 重置计数器
                            
                            // 对剩余的叶节点进行分析，决定是否可以安全删除
                            const nodesToDelete = [];
                            finalLeafNodes.forEach(nodeId => {
                                // 检查这个叶节点是否真的可以删除
                                // 条件：不是起始节点，且不连接重要路径
                                const isStartNode = startNodes.has(nodeId);
                                if (!isStartNode) {
                                    // 进一步检查：如果这个叶节点连接的不是核心节点，则可以删除
                                    const connectedLinks = simplifiedLinks.filter(link => {
                                        const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                        const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                        return sourceId === nodeId || targetId === nodeId;
                                    });
                                    
                                    // 如果连接的节点也不是起始节点，可以考虑删除
                                    let canDelete = true;
                                    for (const link of connectedLinks) {
                                        const otherNodeId = (typeof link.source === 'string' ? link.source : link.source.id) === nodeId ? 
                                            (typeof link.target === 'string' ? link.target : link.target.id) : 
                                            (typeof link.source === 'string' ? link.source : link.source.id);
                                        
                                        // 如果连接的节点是起始节点，则不能删除
                                        if (startNodes.has(otherNodeId)) {
                                            canDelete = false;
                                            break;
                                        }
                                    }
                                    
                                    if (canDelete) {
                                        nodesToDelete.push(nodeId);
                                    }
                                }
                            });
                            
                            if (nodesToDelete.length > 0) {
                                console.log(`发现可安全删除的叶节点: ${nodesToDelete.length}个`);
                                console.log(`可删除节点列表:`, nodesToDelete);
                                
                                // 执行删除
                                const filteredNodes = simplifiedNodes.filter(node => !nodesToDelete.includes(node.id));
                                const filteredLinks = simplifiedLinks.filter(link => {
                                    const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                    const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                    return !nodesToDelete.includes(sourceId) && !nodesToDelete.includes(targetId);
                                });
                                
                                // 更新简化结果
                                simplifiedNodes = filteredNodes;
                                simplifiedLinks = filteredLinks;
                                additionalRemoved = nodesToDelete.length;
                                
                                console.log(`第三轮优化完成，额外删除了 ${additionalRemoved} 个叶节点`);
                            }
                        }
                        
                        // 第二轮优化：移除孤立点（度数为0的节点）
                        const zeroDegreeNodes = [];
                        const finalDegreeMap = new Map();
                        
                        // 重新计算度数
                        simplifiedNodes.forEach(node => {
                            finalDegreeMap.set(node.id, 0);
                        });
                        
                        simplifiedLinks.forEach(link => {
                            const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                            const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                            
                            finalDegreeMap.set(sourceId, (finalDegreeMap.get(sourceId) || 0) + 1);
                            finalDegreeMap.set(targetId, (finalDegreeMap.get(targetId) || 0) + 1);
                        });
                        
                        finalDegreeMap.forEach((degree, nodeId) => {
                            if (degree === 0) { // 不保护任何孤立点
                                zeroDegreeNodes.push(nodeId);
                            }
                        });
                        
                        // 移除孤立点
                        if (zeroDegreeNodes.length > 0) {
                            // 从simplifiedNodes中移除孤立点
                            const filteredSimplifiedNodes = simplifiedNodes.filter(node => !zeroDegreeNodes.includes(node.id));
                            simplifiedLinks = simplifiedLinks.filter(link => {
                                const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                                
                                return !zeroDegreeNodes.includes(sourceId) && !zeroDegreeNodes.includes(targetId);
                            });
                            
                            // 更新simplifiedNodes
                            simplifiedNodes = filteredSimplifiedNodes;
                            console.log(`移除了 ${zeroDegreeNodes.length} 个孤立点`);
                        }
                        
                        // 第四轮优化：深度简化选项（可选）
                        // 检查是否启用深度简化
                        const enableDeepSimplify = confirm(`检测到仍有${finalLeafNodes.length}个叶节点，是否启用深度简化？\n这将删除更多外围节点以获得更简洁的图谱。`);
                        
                        if (enableDeepSimplify && finalLeafNodes.length > 0) {
                            console.log('开始深度简化...');
                            let deepRemoved = 0;
                            
                            // 深度简化：删除度数较小的节点（度数≤2）
                            const lowDegreeNodes = [];
                            finalDegreeMap.forEach((degree, nodeId) => {
                                // 不是起始节点且度数≤2的节点可以考虑删除
                                if (degree <= 2 && !startNodes.has(nodeId)) {
                                    lowDegreeNodes.push(nodeId);
                                }
                            });
                            
                            if (lowDegreeNodes.length > 0) {
                                console.log(`发现可深度简化的低度数节点: ${lowDegreeNodes.length}个`);
                                
                                // 执行深度删除
                                const deepFilteredNodes = simplifiedNodes.filter(node => !lowDegreeNodes.includes(node.id));
                                const deepFilteredLinks = simplifiedLinks.filter(link => {
                                    const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                                    const targetId = typeof link.target === 'string' ? link.target : link.target.id;

        // 预警数据缓存
        let alertDataCache = null;
        let alertDataTimestamp = 0;
        const ALERT_CACHE_DURATION = 60000; // 缓存1分钟
        
        // 从后端API获取预警数据
        async function fetchAlertData() {
            try {
                // 检查缓存是否有效
                const now = Date.now();
                if (alertDataCache && (now - alertDataTimestamp) < ALERT_CACHE_DURATION) {
                    return alertDataCache;
                }
                
                // 获取案件参数
                const caseParams = getCaseParams();
                
                // 构建请求参数
                const params = new URLSearchParams();
                if (caseParams.caseIndex) params.append('caseIndex', caseParams.caseIndex);
                if (caseParams.caseName) params.append('caseName', caseParams.caseName);
                if (caseParams.caseTime) params.append('caseTime', caseParams.caseTime);
                
                // 调用后端API
                const response = await fetch(`http://localhost:5000/api/alert-data?${params.toString()}`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    // 更新缓存
                    alertDataCache = result.data;
                    alertDataTimestamp = now;
                    return result.data;
                }
                return [];
            } catch (error) {
                console.error('获取预警数据失败:', error);
                return [];
            }
        }
        
        // 检查节点是否有预警
        async function hasAlertForNode(nodeId) {
            const alerts = await fetchAlertData();
            return alerts.some(alert => alert.nodeId === nodeId && alert.status === 'active');
        }
        
        // 同步版本的hasAlertForNode，用于不支持异步的场景
        function hasAlertForNodeSync(nodeId) {
            // 首先检查缓存
            if (alertDataCache) {
                return alertDataCache.some(alert => alert.nodeId === nodeId && alert.status === 'active');
            }
            // 缓存未加载时，使用localStorage作为 fallback
            const alerts = JSON.parse(localStorage.getItem('financialAlerts') || '[]');
            return alerts.some(alert => alert.nodeId === nodeId && alert.status === 'active');
        }
        
        // 获取节点的预警级别
        async function getNodeAlertLevel(nodeId) {
            const alerts = await fetchAlertData();
            const nodeAlerts = alerts.filter(alert => alert.nodeId === nodeId && alert.status === 'active');
            if (nodeAlerts.length === 0) return null;
            
            // 返回最高风险级别
            const levelPriority = { 'critical': 4, 'high': 3, 'medium': 2, 'low': 1 };
            let highestLevel = 'low';
            nodeAlerts.forEach(alert => {
                if (levelPriority[alert.level] > levelPriority[highestLevel]) {
                    highestLevel = alert.level;
                }
            });
            return highestLevel;
        }

        function getNodeAlertLevelSync(nodeId) {

                // 缓存未加载时，使用localStorage作为 fallback

                // 遍历表格行，更新预警标记

                // 选择所有节点
                const nodes = d3.select('#transactionGraph svg').selectAll('.node');

                    const nodeId = d.id;
                    
                    // 检查是否有预警
                    const hasAlert = alertNodeIds.has(nodeId);
                    
                    // 移除现有的预警图标
                    nodeElement.select('.alert-icon').remove();
                    
                    // 添加预警图标（如果有预警）
                    if (hasAlert) {
                        nodeElement.append('circle')
                            .attr('class', 'alert-icon')

                            .style('stroke-width', 2);

        // 交易图谱数据追踪 - 跳转到 detal.html页面
        function trackNode(nodeId) {
            if (!nodeId) {
                alert('节点 ID 为空！');
              return;
            }
            
            // URL 解码节点 ID（将%E5%B1%B1%E8%A5%BF...转换为汉字）
            const decodedNodeId = decodeURIComponent(nodeId);
            
            // 清理节点 ID（去除首尾空格和\t）
            const cleanNodeId = decodedNodeId.toString().trim().replace(/^\t+/, '');
            
            // 关闭详情弹窗
            const detailsModal = document.getElementById('detailsModal');
            if (detailsModal) {
                detailsModal.style.display = 'none';
            }
            
            // 跳转到 detal.html页面，通过 URL 参数传递节点 ID 和案件参数
            const urlParams = new URLSearchParams(window.location.search);
            const caseIndex = urlParams.get('caseIndex');
            const caseName = urlParams.get('caseName');
            const caseTime = urlParams.get('caseTime');
            
            let detalUrl = `detal.html?nodeId=${encodeURIComponent(cleanNodeId)}`;
            if (caseIndex) detalUrl += `&caseIndex=${encodeURIComponent(caseIndex)}`;
            if (caseName) detalUrl += `&caseName=${encodeURIComponent(caseName)}`;
            if (caseTime) detalUrl += `&caseTime=${encodeURIComponent(caseTime)}`;
            
            window.open(detalUrl, '_blank');
            // 新窗口打开，保留原窗口
        }
        
        // 根据时间筛选详情记录
        function filterDetailsByTime(nodeId) {
            const startTime = document.getElementById('startTimeFilter').value;
            const endTime = document.getElementById('endTimeFilter').value;
            
            if (!excelData) {
                alert('没有可用的数据');
                return;
            }
            
            // 清理节点ID（去除首尾空格和\t）
            const cleanNodeId = decodeURIComponent(nodeId).trim().replace(/^\t+/, '');
            
            // 根据节点ID查找原始数据行
            let filteredRows = excelData.filter(row => {
                const senderName = getRowValue(row, '交易方户名');
                const receiverName = getRowValue(row, '对手户名');
                // 同时检查清理后的ID和原始ID
                const senderMatch = senderName && (senderName.toString().includes(cleanNodeId) || senderName.toString().includes(decodeURIComponent(nodeId)));
                const receiverMatch = receiverName && (receiverName.toString().includes(cleanNodeId) || receiverName.toString().includes(decodeURIComponent(nodeId)));
                return senderMatch || receiverMatch;

            if (action === 'first') {

            } else if (action === 'prev') {
                newPage = Math.max(1, invoiceCurrentPage - 1);
            } else if (action === 'next') {
                newPage = Math.min(totalPages, invoiceCurrentPage + 1);
            } else if (action === 'last') {
                newPage = totalPages;

            if (newPage >= 1 && newPage <= totalPages && newPage !== invoiceCurrentPage) {
                invoiceCurrentPage = newPage;

        // 合并相似的节点（去除首尾空格后相同的节点）
        function mergeSimilarNodes(nodes) {
            const nodeMap = new Map();
            const mergedNodes = [];
            
            nodes.forEach(node => {
                const normalizedNode = node.toString().trim();
                if (!nodeMap.has(normalizedNode)) {
                    nodeMap.set(normalizedNode, node);
                    mergedNodes.push(node);
                }
            });
            
            return mergedNodes;
        }
        
        // 处理拓扑数据，合并相似节点
        function processTopologyData(nodes, links) {
            // 创建节点映射（标准化名称 -> 原始节点）
            const nodeMapping = new Map();
            const normalizedNodes = [];
            
            nodes.forEach(node => {
                const nodeId = typeof node === 'string' ? node : node.id;
                const normalizedId = nodeId.toString().trim();
                
                if (!nodeMapping.has(normalizedId)) {
                    nodeMapping.set(normalizedId, node);
                    normalizedNodes.push(node);
                }
            });
            
            // 处理链接，将相似节点的链接合并
            const processedLinks = [];
            links.forEach(link => {
                const sourceId = typeof link.source === 'string' ? link.source : link.source.id;
                const targetId = typeof link.target === 'string' ? link.target : link.target.id;
                
                const normalizedSource = sourceId.toString().trim();
                const normalizedTarget = targetId.toString().trim();
                
                // 使用标准化后的节点
                const normalizedLink = {
                    ...link,
                    source: nodeMapping.get(normalizedSource) || link.source,
                    target: nodeMapping.get(normalizedTarget) || link.target
                };
                
                processedLinks.push(normalizedLink);
            });
            
            return {
                nodes: normalizedNodes,
                links: processedLinks,
                nodeMapping: nodeMapping
            };
        }

                // 调用后端API获取发票数据
                const response = await fetch('http://localhost:5000/api/invoice-filter', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(criteria)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    // 构建发票图谱数据
                    const invoiceData = result.data;
                    const nodes = [];
                    const links = [];
                    const nodeMap = new Map();
                    
                    // 提取初始搜索节点
                    const initialNodes = new Set();
                    if (sellerFilter) initialNodes.add(sellerFilter);
                    if (buyerFilter) initialNodes.add(buyerFilter);
                    
                    invoiceData.forEach(invoice => {
                        // 安全地获取发票字段，处理可能的null值
                        const seller = invoice['销方名称'] ? invoice['销方名称'].toString() : 
                                      invoice['销售方'] ? invoice['销售方'].toString() : null;
                        const buyer = invoice['购方企业名称'] ? invoice['购方企业名称'].toString() :
                                      invoice['购买方'] ? invoice['购买方'].toString() : null;
                        
                        // 验证数据有效性
                        if (!seller || !buyer || seller === buyer) {
                            return; // 跳过当前项，继续处理下一个
                        }
                        
                        // 添加销售方节点
                        if (seller) {
                            const isInitialNode = initialNodes.has(seller);
                            if (!nodeMap.has(seller)) {
                                nodes.push({ id: seller, group: 'seller', name: seller, isInitial: isInitialNode });
                                nodeMap.set(seller, nodes.length - 1);
                            }
                        }
                        
                        // 添加购买方节点
                        if (buyer) {
                            const isInitialNode = initialNodes.has(buyer);
                            if (!nodeMap.has(buyer)) {
                                nodes.push({ id: buyer, group: 'buyer', name: buyer, isInitial: isInitialNode });
                                nodeMap.set(buyer, nodes.length - 1);
                            }
                        }
                        
                        // 添加链接
                        if (seller && buyer) {
                            links.push({
                                source: seller,
                                target: buyer,
                                amount: parseFloat(invoice['价税合计'] || invoice['金额'] || 0),
                                tax_amount: parseFloat(invoice['税额'] || 0),
                                new_total_amount: parseFloat(invoice['新价税合计'] || 0),
                                invoice_code: invoice['发票代码'] || '',
                                invoice_number: invoice['发票号码'] || '',
                                seller_tax_code: invoice['销方税号'] || '',
                                buyer_tax_code: invoice['购方税号'] || '',
                                date: invoice['开票日期'] || ''
                            });
                        }
                    });
                    
                    // 清理之前的发票统计信息
                    const existingInvoiceStats = document.getElementById('invoiceGraphStats');
                    if (existingInvoiceStats) {
                        existingInvoiceStats.innerHTML = '';
                    }
                    
                    // 使用D3.js创建发票图谱
                    createInvoiceGraph(nodes, links, invoiceData, initialNodes);
                    
                    // 显示发票统计信息
                    const statsDiv = document.createElement('div');
                    statsDiv.id = 'invoiceStats';
                    statsDiv.style.cssText = 'margin-top: 20px; padding: 15px; background-color: #f0f8ff; border: 1px solid #b0d4f1; border-radius: 5px;';
                    
                    const totalAmount = invoiceData.reduce((sum, inv) => sum + (parseFloat(inv['价税合计']) || 0), 0);
                    
                    statsDiv.innerHTML = `
                        <h4>发票往来统计信息</h4>
                        <p><strong>总发票数:</strong> ${invoiceData.length}</p>
                        <p><strong>总金额:</strong> ${totalAmount.toFixed(2)}</p>
                        <p><strong>相关节点数:</strong> ${nodes.length}</p>
                        <p><strong>初始节点数:</strong> ${initialNodes.size}</p>
                    `;
                    
                    // 将统计信息添加到发票图谱容器
                    document.getElementById('invoiceGraphStats').appendChild(statsDiv);
                } else {
                    document.getElementById('invoiceResults').innerHTML = `<p style="color: red;">获取发票数据失败: ${result.error || '未知错误'}</p>`;
                }
            } catch (error) {
                console.error('发票图谱错误:', error);
                document.getElementById('invoiceResults').innerHTML = `<p style="color: red;">生成发票图谱时出错: ${error.message}</p>`;
            }
        }
        
        // 创建发票图谱的D3.js函数
        function createInvoiceGraph(nodes, links, invoiceData, initialNodes) {
            // 清空容器
            d3.select('#invoiceGraph').selectAll('*').remove();
            
            const width = document.getElementById('invoiceGraph').clientWidth;
            const height = document.getElementById('invoiceGraph').clientHeight;
            
            // 创建SVG
            const svg = d3.select('#invoiceGraph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // 定义颜色比例尺
            const color = d3.scaleOrdinal()
                .domain(['seller', 'buyer'])
                .range(['#ff6b6b', '#4ecdc4']);
            
            // 创建力导向图模拟器
            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
            
            // 绘制链接
            const link = svg.append('g')
                .attr('stroke', '#999')
                .attr('stroke-opacity', 0.6)
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('stroke-width', 1.5); // 统一使用固定线条粗细
            
            // 绘制节点
            const node = svg.append('g')
                .attr('stroke', '#fff')
                .attr('stroke-width', 1.5)
                .selectAll('circle')
                .data(nodes)
                .join('circle')
                .attr('r', d => {
                    // 初始节点更大
                    if (initialNodes.has(d.id)) return 12;
                    return 8;
                })
                .attr('fill', d => color(d.group))
                .call(drag(simulation));
            
            // 添加节点标签
            const labels = svg.append('g')
                .attr('class', 'labels')
                .selectAll('text')
                .data(nodes)
                .join('text')
                .text(d => d.name.length > 10 ? d.name.substring(0, 10) + '...' : d.name)
                .attr('font-size', '12px')
                .attr('dx', 12)
                .attr('dy', 4);
            
            // 定义拖拽功能
            function drag(simulation) {
                function dragstarted(event) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    event.subject.fx = event.subject.x;
                    event.subject.fy = event.subject.y;
                }
                
                function dragged(event) {
                    event.subject.fx = event.x;
                    event.subject.fy = event.y;
                }
                
                function dragended(event) {
                    if (!event.active) simulation.alphaTarget(0);
                    event.subject.fx = null;
                    event.subject.fy = null;
                }
                
                return d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended);
            }
            
            // 添加点击事件显示详细信息
            node.on('click', function(event, d) {
                // 通用函数：获取发票字段（兼容带\t和不带\t的格式）
                function getInvoiceValue(row, baseName) {
                    if (!row) return '';
                    // 优先检查带\t的列名
                    if (('\t' + baseName) in row) return row['\t' + baseName];
                    // 再检查不带\t的列名
                    if (baseName in row) return row[baseName];
                    return '';
                }
                
                const relatedInvoices = invoiceData.filter(inv => {
                    const seller = getInvoiceValue(inv, '销售方') || getInvoiceValue(inv, '销方名称');
                    const buyer = getInvoiceValue(inv, '购买方') || getInvoiceValue(inv, '购方企业名称');
                    return seller === d.id || buyer === d.id;
                });
                
                // 计算总金额统计
                const totalAmount = relatedInvoices.reduce((sum, inv) => sum + parseFloat(getInvoiceValue(inv, '金额') || 0), 0);
                const totalTax = relatedInvoices.reduce((sum, inv) => sum + parseFloat(getInvoiceValue(inv, '税额') || 0), 0);
                const totalWithTax = relatedInvoices.reduce((sum, inv) => sum + parseFloat(getInvoiceValue(inv, '新价税合计') || getInvoiceValue(inv, '价税合计') || 0), 0);
                
                let detailsHtml = `<h4>节点详情：${d.id}</h4>`;
                                
                // 添加追踪节点按钮 - 跳转到 detal.html
                detailsHtml += `<div style="margin-bottom: 20px; padding: 15px; background-color: #e3f2fd; border: 2px solid #2196f3; border-radius: 8px; text-align: center;">`;
                detailsHtml += `<h4 style="margin: 0 0 10px 0; color: #1976d2;">🔍 追踪此节点</h4>`;
                detailsHtml += `<button id="trackNodeBtn" style="padding: 10px 20px; background-color: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;">🎯 追踪节点</button>`;
                detailsHtml += `</div>`;
                                
                // 添加总统计信息
                detailsHtml += `
                    <div style="background-color: #e3f2fd; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                        <h5 style="margin: 0 0 10px 0; color: #1976d2;">汇总统计</h5>
                        <p style="margin: 5px 0;"><strong>发票总数:</strong> ${relatedInvoices.length} 张</p>
                        <p style="margin: 5px 0;"><strong>总金额:</strong> ${totalAmount.toFixed(2)} 元</p>
                        <p style="margin: 5px 0;"><strong>总税额:</strong> ${totalTax.toFixed(2)} 元</p>
                        <p style="margin: 5px 0;"><strong>总价税合计:</strong> ${totalWithTax.toFixed(2)} 元</p>
                    </div>
                `;
                
                detailsHtml += '<div style="max-height: 300px; overflow-y: auto;">';
                
                relatedInvoices.forEach(inv => {
                    detailsHtml += `
                        <div style="margin-bottom: 10px; padding: 5px; background-color: #f9f9f9; border-radius: 3px;">
                            <p><strong>发票代码:</strong> ${getInvoiceValue(inv, '发票代码')}</p>
                            <p><strong>发票号码:</strong> ${getInvoiceValue(inv, '发票号码')}</p>
                            <p><strong>销方税号:</strong> ${getInvoiceValue(inv, '销方税号')}</p>
                            <p><strong>购方税号:</strong> ${getInvoiceValue(inv, '购方税号')}</p>
                            <p><strong>销方名称:</strong> ${getInvoiceValue(inv, '销方名称') || getInvoiceValue(inv, '销售方')}</p>
                            <p><strong>购方企业名称:</strong> ${getInvoiceValue(inv, '购方企业名称') || getInvoiceValue(inv, '购买方')}</p>
                            <p><strong>金额:</strong> ${parseFloat(getInvoiceValue(inv, '金额') || 0).toFixed(2)}</p>
                            <p><strong>税额:</strong> ${parseFloat(getInvoiceValue(inv, '税额') || 0).toFixed(2)}</p>
                            <p><strong>新价税合计:</strong> ${parseFloat(getInvoiceValue(inv, '新价税合计') || 0).toFixed(2)}</p>
                            <p><strong>价税合计:</strong> ${parseFloat(getInvoiceValue(inv, '价税合计') || 0).toFixed(2)}</p>
                            <p><strong>开票日期:</strong> ${getInvoiceValue(inv, '开票日期')}</p>
                        </div>
                    `;
                });
                
                detailsHtml += '</div>';
                
                // 创建弹窗显示详细信息
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0,0,0,0.5);
                    z-index: 10000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                `;
                
                const modalContent = document.createElement('div');
                modalContent.style.cssText = `
                    background-color: white;
                    padding: 20px;
                    border-radius: 8px;
                    max-width: 600px;
                    max-height: 80vh;
                    overflow-y: auto;
                    position: relative;
                `;
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '&times;';
                closeBtn.style.cssText = `
                    position: absolute;
                    top: 10px;
                    right: 15px;
                    font-size: 24px;
                    cursor: pointer;
                `;
                
                closeBtn.onclick = () => modal.remove();
                
                modalContent.innerHTML = detailsHtml;
                modalContent.appendChild(closeBtn);
                modal.appendChild(modalContent);
                document.body.appendChild(modal);
                
                // 使用 setTimeout 确保 DOM 已渲染完成
                setTimeout(() => {
                    const trackBtn = document.getElementById('trackNodeBtn');
                    console.log('追踪按钮:', trackBtn);
                    if (trackBtn) {
                        trackBtn.onclick= function() {
                            console.log('点击追踪节点，节点 ID:', d.id);
                            trackInvoiceNodeToDetail(d.id);
                        };
                    }
                }, 0);
            });
            
            // 更新节点和链接的位置
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);
                
                labels
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
        }

        // 下载交易图谱为PNG
        function downloadTransactionGraph() {
            const svgElement = d3.select('#transactionGraph svg').node();
            if (!svgElement) {
                alert('请先生成图谱');
                return;
            }
            
            // 获取SVG内容
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            
            // 创建Canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置Canvas尺寸
            const svgRect = svgElement.getBoundingClientRect();
            canvas.width = svgRect.width;
            canvas.height = svgRect.height;
            
            // 创建Image对象
            const img = new Image();
            const svgUrl = URL.createObjectURL(svgBlob);
            
            img.onload = function() {
                // 在Canvas上绘制SVG
                ctx.drawImage(img, 0, 0);
                
                //为PNG并下载
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = '交易往来图谱.png';
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');
                
                URL.revokeObjectURL(svgUrl);
            };
            
            img.src = svgUrl;
        }

        // 导出发票筛选结果为Excel
        function exportInvoiceExcel() {
            // 获取发票结果表格
            const tableElement = document.querySelector('#invoiceResults table');
            if (!tableElement) {
                alert('请先应用发票筛选条件并生成结果');
                return;
            }
            
            // 获取表格数据
            const rows = tableElement.querySelectorAll('tr');
            const excelDataArray = [];
            
            // 提取表头
            const headerRow = rows[0];
            const headers = [];
            headerRow.querySelectorAll('th').forEach(th => {
                headers.push(th.textContent.trim());
            });
            excelDataArray.push(headers);
            
            // 提取数据行
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const dataRow = [];
                row.querySelectorAll('td').forEach(td => {
                    dataRow.push(td.textContent.trim());
                });
                excelDataArray.push(dataRow);
            }
            
            if (excelDataArray.length <= 1) {
                alert('没有数据可导出');
                return;
            }
            
            // 使用SheetJS创建Excel文件
            const worksheet = XLSX.utils.aoa_to_sheet(excelDataArray);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, '发票筛选结果');
            
            // 设置列宽
            const colWidths = [];
            for (let i = 0; i < headers.length; i++) {
                colWidths.push({ wch: 15 }); // 默认列宽
            }
            worksheet['!cols'] = colWidths;
            
            // 生成Excel文件并下载
            const excelBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', '发票筛选结果_' + new Date().toISOString().slice(0, 10) + '.xlsx');
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

                if (event.target === batchDataModal) {
                    batchDataModal.style.display = 'none';
                }
            });
            
            // 处理 URL 参数中的追踪节点
            const urlParams = new URLSearchParams(window.location.search);
            const trackNodeParam = urlParams.get('trackNode');
            
            if (trackNodeParam) {
                console.log('检测到追踪节点参数:', trackNodeParam);
                
                // 等待数据加载完成后自动填充筛选条件
                setTimeout(() => {
                    // 将节点 ID 填充到户名筛选框中
                    const accountNameFilter = document.getElementById('accountNameFilter');
                    if (accountNameFilter) {
                        accountNameFilter.value = trackNodeParam;
                        console.log('已自动填充户名筛选:', trackNodeParam);
                        
                        // 自动触发筛选
                        applyFilters();
                        
                        // 滚动到筛选结果区域
                        const resultsSection = document.getElementById('transactionResults');
                        if (resultsSection) {
                           resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                }, 1000);
            }
        });
        
        // 新增发票功能
        async function addInvoiceRecord() {
            // 收集表单数据
            const caseParams = getCaseParams();
            const formData = {
                caseIndex: caseParams.caseIndex,
                caseName: caseParams.caseName,
                caseTime: caseParams.caseTime,
                invoiceDate: document.getElementById('invoiceDate').value,
                invoiceType: document.getElementById('invoiceType').value,
                sellerName: document.getElementById('sellerName').value,
                buyerName: document.getElementById('buyerName').value,
                productCategory: document.getElementById('productCategory').value,
                productName: document.getElementById('productName').value,
                quantity: parseFloat(document.getElementById('quantity').value) || 0,
                unitPrice: parseFloat(document.getElementById('unitPrice').value) || 0,
                amountWithoutTax: parseFloat(document.getElementById('amountWithoutTax').value) || 0,
                taxRate: parseFloat(document.getElementById('taxRate').value) || 0,
                taxAmount: parseFloat(document.getElementById('taxAmount').value) || 0,
                totalAmount: parseFloat(document.getElementById('totalAmount').value) || 0,
                sellerBank: document.getElementById('sellerBank').value,
                sellerBankAccount: document.getElementById('sellerBankAccount').value,
                buyerBank: document.getElementById('buyerBank').value,
                buyerBankAccount: document.getElementById('buyerBankAccount').value,
                invoiceStatus: document.getElementById('invoiceStatus').value,
                remark: document.getElementById('remark').value
            };
            
            try {
                const response = await fetch('http://localhost:5000/api/invoice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    alert('发票添加成功！');
                    closeAddInvoiceModal();
                    // 可选：刷新数据
                    location.reload();
                } else {
                    alert('添加失败: ' + result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('添加发票时出错: ' + error.message);
            }
        }
        
        // 删除交易记录函数
        async function deleteTransactionRecord(index, rowData) {
            // 解析行数据
            const row = JSON.parse(decodeURIComponent(rowData));
            
            if (!confirm('确定要删除这条交易记录吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                // 构建删除请求数据
                const deleteData = {
                    '交易卡号': row['	交易卡号'] || '',
                    '交易账号': row['	交易账号'] || '',
                    '交易方户名': row['	交易方户名'] || '',
                    '交易时间': row['	交易时间'] || '',
                    '交易金额': row['	交易金额'] || '',
                    '借贷标志': row['	借贷标志'] || ''
                };
                
                console.log('准备删除的数据:', deleteData);
                
                // 调用后端API删除记录
                const response = await fetch('http://localhost:5000/api/delete-transaction', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(deleteData)
                });
                
                const result = await response.json();
                console.log('删除结果:', result);
                
                if (response.ok && result.success) {
                    alert('交易记录删除成功！');
                    // 关闭详情弹窗
                    document.getElementById('detailsModal').style.display = 'none';
                    // 可选：刷新图谱或数据
                    location.reload();
                } else {
                    alert('删除失败: ' + (result.message || result.error));
                }
            } catch (error) {
                console.error('删除错误:', error);
                alert('删除记录时出错: ' + error.message);
            }
        }
